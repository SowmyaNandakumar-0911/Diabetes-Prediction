<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction System</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
width:100%;
max-width:1100px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.title{
text-align:center;
color:white;
margin-bottom:10px;
font-size:35px;
font-weight:700;
}

.subtitle{
text-align:center;
color:#d9d9d9;
margin-bottom:40px;
}

form{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.input-box{
display:flex;
flex-direction:column;
}

label{
color:white;
margin-bottom:8px;
font-weight:500;
}

input{
padding:14px;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
transition:.3s;
}

input:focus{
transform:scale(1.02);
box-shadow:0 0 15px rgba(0,255,255,.4);
}

.button-box{
grid-column:span 2;
display:flex;
justify-content:center;
margin-top:20px;
}

button{
padding:15px 45px;
border:none;
border-radius:40px;
background:#00c6ff;
background:linear-gradient(to right,#0072ff,#00c6ff);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,198,255,.5);
}

.result{
margin-top:35px;
text-align:center;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,.1);
}

.result h2{
color:white;
margin-bottom:10px;
}

.result p{
font-size:28px;
font-weight:700;
color:#00ff99;
}

.footer{
text-align:center;
color:white;
margin-top:30px;
opacity:.7;
font-size:14px;
}

@media(max-width:768px){

form{
grid-template-columns:1fr;
}

.button-box{
grid-column:span 1;
}

}

    </style>

</head>

<body>

<div class="container">

<h1 class="title">🩺 Diabetes Prediction System</h1>

<p class="subtitle">
Artificial Intelligence Powered Clinical Decision Support
</p>

<form action="/predict" method="POST">

<div class="input-box">
<label>Pregnancies</label>
<input type="number" name="Pregnancies" required>
</div>

<div class="input-box">
<label>Glucose</label>
<input type="number" step="any" name="Glucose" required>
</div>

<div class="input-box">
<label>Blood Pressure</label>
<input type="number" step="any" name="BloodPressure" required>
</div>

<div class="input-box">
<label>Skin Thickness</label>
<input type="number" step="any" name="SkinThickness" required>
</div>

<div class="input-box">
<label>Insulin</label>
<input type="number" step="any" name="Insulin" required>
</div>

<div class="input-box">
<label>BMI</label>
<input type="number" step="0.01" name="BMI" required>
</div>

<div class="input-box">
<label>Diabetes Pedigree Function</label>
<input type="number" step="0.001" name="DiabetesPedigreeFunction" required>
</div>

<div class="input-box">
<label>Age</label>
<input type="number" name="Age" required>
</div>

<div class="button-box">
<button type="submit">
Predict Diabetes
</button>
</div>

</form>

{% if results %}

<div class="result">

<h2>Prediction Result</h2>

<p>{{ results }}</p>

<br>

<h3 style="color:white;">
Risk Level: {{ risk_level }}
</h3>

<br>

<h3 style="color:white;">
Confidence: {{ confidence }}%
</h3>

</div>

{% endif %}

<div class="footer">

Designed with ❤️ using Flask • Scikit-Learn • Machine Learning

</div>

</div>

</body>

</html>
